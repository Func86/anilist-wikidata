query Manga($perPage: Int, $idIn: [Int]) {
  Page(perPage: $perPage) {
    pageInfo {
      hasNextPage
    }
    media(type: MANGA, sort: ID, id_in: $idIn) {
      id
      title {
        english
        native
        romaji
      }
      format
      countryOfOrigin
      startDate {
        year
      }
      chapters
      volumes
      staff(sort: [RELEVANCE, ID]) {
        edges {
          role
          node {
            name {
              full
            }
          }
        }
      }
      siteUrl
      idMal
      updatedAt
    }
  }
}
