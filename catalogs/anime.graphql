query Anime($perPage: Int, $idIn: [Int]) {
  Page(perPage: $perPage) {
    pageInfo {
      hasNextPage
    }
    media(type: ANIME, sort: ID, id_in: $idIn) {
      id
      title {
        english
        native
        romaji
      }
      format
      countryOfOrigin
      relations {
        edges {
          relationType
        }
      }
      duration
      episodes
      startDate {
        year
      }
      episodes
      studios(isMain: true) {
        nodes {
          name
        }
      }
      staff(sort: [RELEVANCE, ID]) {
        edges {
          role
          node {
            name {
              full
            }
          }
        }
      }
      siteUrl
      idMal
      updatedAt
    }
  }
}
