query Characters($perPage: Int, $idIn: [Int]) {
  Page(perPage: $perPage) {
    pageInfo {
      hasNextPage
    }
    characters(sort: ID, id_in: $idIn) {
      id
      name {
        full
        native
        alternative
        alternativeSpoiler
      }
      dateOfBirth {
        day
        month
        year
      }
      bloodType
      gender
      siteUrl
      media(sort: START_DATE) {
        nodes {
          id
          format
          type
          countryOfOrigin
          title {
            english
            romaji
          }
          startDate {
            year
          }
        }
      }
    }
  }
}
