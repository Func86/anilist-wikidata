query Staff($perPage: Int, $idIn: [Int]) {
  Page(perPage: $perPage) {
    pageInfo {
      hasNextPage
    }
    staff(sort: ID, id_in: $idIn) {
      id
      name {
        native
        full
        first
        last
        alternative
      }
      gender
      bloodType
      dateOfBirth {
        year
        month
        day
      }
      dateOfDeath {
        day
        month
        year
      }
      homeTown
      yearsActive
      primaryOccupations
      description
      siteUrl
    }
  }
}
